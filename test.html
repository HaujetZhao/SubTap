<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>纯函数测试</title>
<style>
  body { font-family: monospace; padding: 20px; white-space: pre-wrap; }
  .pass { color: #16a34a; }
  .fail { color: #dc2626; font-weight: bold; }
</style>
</head>
<body>
<div id="out"></div>
<script type="module">
import { parseSRT, timestampToSeconds } from './src/srt-parser.js';
import { buildVocab, lookupWords } from './src/word-lookup.js';
import { createVocabStore } from './src/vocab-store.js';
import { computeEffectiveRanges } from './src/subtitle-tweak.js';
import { tokenizeForRender, classifyWords } from './src/word-lookup.js';
import { lemmatize } from './src/lemmatize.js';

const out = document.getElementById('out');
let pass = 0, fail = 0;
function check(name, cond) {
  if (cond) { pass++; out.innerHTML += '<span class="pass">✓ ' + name + '</span>\n'; }
  else { fail++; out.innerHTML += '<span class="fail">✗ ' + name + '</span>\n'; }
}

// --- timestampToSeconds ---
check('ts: 00:00:01,480 → 1.48', timestampToSeconds('00:00:01,480') === 1.48);
check('ts: 00:01:02,500 → 62.5', timestampToSeconds('00:01:02,500') === 62.5);
check('ts: 点分隔 00:00:05.000 → 5', timestampToSeconds('00:00:05.000') === 5);
check('ts: 非法返回 null', timestampToSeconds('abc') === null);

// --- parseSRT ---
const sample = '1\n00:00:00,080 --> 00:00:01,480\nWhen you encode text into binary\n\n'
  + '2\n00:00:02,080 --> 00:00:04,200\nit\'s often nice\nto use as little data as possible\n\n'
  + '3\n00:00:04,720 --> 00:00:10,600\nSo you might naturally wonder\n';
const s = parseSRT(sample);
check('解析出 3 句', s.length === 3);
check('第1句 start=0.08', s[0].start === 0.08);
check('第1句 id=1', s[0].id === 1);
check('第1句文本正确', s[0].text === 'When you encode text into binary');
check('第2句多行文本合并', s[1].text === "it's often nice\nto use as little data as possible");
check('容错：坏块跳过', parseSRT('1\n00:00:00,080 --> 00:00:01,480\nhello\n\n坏块\n\n2\n00:00:02,000 --> 00:00:03,000\nworld\n').length === 2);

// --- buildVocab / lookupWords ---
const vo = { '初中': { 'encode': 'v. 编码', 'text': 'n. 文本' }, '四级': { 'compress': 'v. 压缩', 'binary': 'n. 二进制' } };
const v = buildVocab(vo);
check('buildVocab: encode 命中 初中', v['encode'].level === '初中' && v['encode'].def === 'v. 编码');
check('buildVocab: compress 命中 四级', v['compress'].level === '四级');
const w = lookupWords('When you ENCODE text into binary!', v);
check('lookup: 数量=3', w.length === 3);
check('lookup: 大小写归一', w[0].word === 'encode');
check('lookup: 去标点', w[2].word === 'binary');
check('lookup: 重复去重', lookupWords('text text text', v).length === 1);
check('lookup: 未命中不返回', lookupWords('hello world', v).length === 0);

// --- VocabStore ---
const store = createVocabStore(buildVocab, classifyWords);
store.init(vo);
check('VocabStore: isReady', store.isReady() === true);
check('VocabStore: levels 顺序(含超纲)', JSON.stringify(store.getLevels()) === '["初中","四级","超纲"]');
check('VocabStore: 四级默认不勾选', store.isEnabled('四级') === false);
// 为查询测试启用 初中/四级（默认是关闭的）
store.setEnabled('初中', true);
store.setEnabled('四级', true);
const g1 = store.lookupByLevel('When you ENCODE text into binary compress');
check('lookupByLevel: 初中 2 词', g1['初中'] && g1['初中'].length === 2);
check('lookupByLevel: 四级 2 词', g1['四级'] && g1['四级'].length === 2);
check('lookupByLevel: 初中首词 encode', g1['初中'][0].word === 'encode');
store.setEnabled('四级', false);
check('VocabStore: 取消后 false', store.isEnabled('四级') === false);
const g2 = store.lookupByLevel('When you ENCODE text into binary compress');
check('lookupByLevel: 取消后无四级栏', g2['四级'] === undefined && g2['初中'].length === 2);
const gh = store.lookupByLevel('hello world');
check('lookupByLevel: 全超纲词归超纲组', !!gh['超纲'] && gh['超纲'].length === 2);
// 超纲分级
const sg = store.lookupByLevel('encode compress zzz'); // encode→初中, compress→四级(已关), zzz→超纲
check('VocabStore: 超纲组存在', !!sg['超纲'] && sg['超纲'].length === 1);
store.setEnabled('超纲', false);
check('VocabStore: 取消超纲后无超纲栏', store.lookupByLevel('encode zzz')['超纲'] === undefined);
store.setEnabled('超纲', true);
// 默认勾选状态
const s2 = createVocabStore(buildVocab, classifyWords);
s2.init(vo);
check('VocabStore: 初中默认不勾选', s2.isEnabled('初中') === false);
check('VocabStore: 超纲默认勾选', s2.isEnabled('超纲') === true);

  // --- subtitle-tweak ---
  const ss = [{ id: 1, start: 0, end: 1 }, { id: 2, start: 2, end: 3 }, { id: 3, start: 5, end: 6 }];
  const m0 = computeEffectiveRanges(ss, {});
  check('tweak: 默认 effStart=start/effEnd=end', m0.get(1).effStart === 0 && m0.get(1).effEnd === 1);
  const mo = computeEffectiveRanges(ss, { offset: 1 });
  check('tweak: offset 影响 start', mo.get(1).effStart === 1);
  const me = computeEffectiveRanges(ss, { extend: 0.5 });
  check('tweak: extend 影响 end', me.get(1).effEnd === 1.5);
  const ml = computeEffectiveRanges(ss, { linkNext: true });
  check('tweak: linkNext 连下一句 start', ml.get(1).effEnd === 2);
  check('tweak: linkNext 末句用 end', ml.get(3).effEnd === 6);
  const ml2 = computeEffectiveRanges(ss, { linkNext: true, extend: 0.5 });
  check('tweak: linkNext 末句 end+extend', ml2.get(3).effEnd === 6.5);
  const mc = computeEffectiveRanges([{ id: 1, start: 5, end: 6 }], { offset: 10 });
  check('tweak: effEnd<=effStart 夹到 +0.05', mc.get(1).effStart === 15 && mc.get(1).effEnd === 15.05);

  // --- tokenizeForRender / classifyWords ---
  const tv = { 'hello': { level: '初中', def: 'x' } };
  const toks = tokenizeForRender('Hello, world!', tv);
  check('tokenize: 片段数=4', toks.length === 4);
  check('tokenize: 词片段带级别', toks[0].text === 'Hello' && toks[0].level === '初中');
  check('tokenize: 非词片段 level=null', toks[1].text === ', ' && toks[1].level === null);
  check('tokenize: 未命中词=超纲', toks[2].text === 'world' && toks[2].level === '超纲');
  check('tokenize: 末尾标点', toks[3].text === '!' && toks[3].level === null);

  const grps = classifyWords('Hello hello world', tv);
  check('classify: 初中去重=1', grps['初中'] && grps['初中'].length === 1);
  check('classify: 超纲=1', grps['超纲'] && grps['超纲'].length === 1);
  check('classify: 超纲 def 空', grps['超纲'][0].def === '');

  // --- lemmatize ---
  check('lem: raises→含 raise', lemmatize('raises').includes('raise'));
  check('lem: running→含 run', lemmatize('running').includes('run'));
  check('lem: studies→含 study', lemmatize('studies').includes('study'));
  check('lem: went→含 go', lemmatize('went').includes('go'));
  check('lem: happily→含 happy', lemmatize('happily').includes('happy'));
  // 缩约形式还原
  check("lem: don't→do", lemmatize("don't").includes('do'));
  check("lem: can't→can", lemmatize("can't").includes('can'));
  check("lem: it's→it", lemmatize("it's").includes('it'));
  check("lem: let's→let", lemmatize("let's").includes('let'));
  // 撇号所有格：取撇号前 base 再还原（letters' → letters → letter）
  check("lem: letters'→letter", lemmatize("letters'").includes('letter'));
  // 单字母不处理
  check('lem: 单字母 s→空', lemmatize('s').length === 0);
  // 比较级 / 最高级 / 副词
  check('lem: easier→easy', lemmatize('easier').includes('easy'));
  check('lem: easiest→easy', lemmatize('easiest').includes('easy'));
  check('lem: inexorably→inexorable', lemmatize('inexorably').includes('inexorable'));
  check('lem: heard→hear（不规则）', lemmatize('heard').includes('hear'));

  // --- 词形还原查词（端到端） ---
  const lvo = { '初中': { raise: 'v. 举起', run: 'v. 跑', study: 'v. 学习', letter: 'n. 字母' } };
  const lv = buildVocab(lvo);
  check('lookup: raises 还原命中 raise', lookupWords('He raises his hand', lv)[0].word === 'raise');
  check('classify: raises→raise 显示原形', classifyWords('raises', lv)['初中'][0].word === 'raise');
  check('classify: raises+raising 合并一条', classifyWords('raises raising raised', lv)['初中'].length === 1);
  check('classify: 超纲词还原失败仍超纲', !!classifyWords('zzzz', lv)['超纲']);
  // 缩约/所有格/单字母在查词链路的行为
  check("classify: don't→do 命中（库含 do）", classifyWords("don't", buildVocab({ '初中': { do: 'v. 做' } }))['初中'][0].word === 'do');
  check("classify: letters'→letter 命中", classifyWords("letters'", lv)['初中'][0].word === 'letter');
  check('classify: 单字母不进超纲', classifyWords('a s b', lv)['超纲'] === undefined);
  check('tokenize: 单字母不着色（level=null）', tokenizeForRender('a x', lv)[0].level === null);
  // 双层还原：encodings → encoding → encode
  check('classify: encodings→encode（双层）', classifyWords('encodings', buildVocab({ '初中': { encode: 'v. 编码' } }))['初中'][0].word === 'encode');

out.innerHTML += '\n----\n通过 ' + pass + '，失败 ' + fail + '\n';
</script>
</body>
</html>
