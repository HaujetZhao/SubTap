<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>зәҜеҮҪж•°жөӢиҜ•</title>
<style>
  body { font-family: monospace; padding: 20px; white-space: pre-wrap; }
  .pass { color: #16a34a; }
  .fail { color: #dc2626; font-weight: bold; }
</style>
</head>
<body>
<div id="out"></div>
<script type="module">
import { parseSRT, timestampToSeconds } from './src/srt-parser.js';
import { buildVocab, lookupWords } from './src/word-lookup.js';
import { createVocabStore } from './src/vocab-store.js';
import { computeEffectiveRanges } from './src/subtitle-tweak.js';
import { tokenizeForRender, classifyWords } from './src/word-lookup.js';
import { lemmatize } from './src/lemmatize.js';

const out = document.getElementById('out');
let pass = 0, fail = 0;
function check(name, cond) {
  if (cond) { pass++; out.innerHTML += '<span class="pass">вң“ ' + name + '</span>\n'; }
  else { fail++; out.innerHTML += '<span class="fail">вң— ' + name + '</span>\n'; }
}

// --- timestampToSeconds ---
check('ts: 00:00:01,480 вҶ’ 1.48', timestampToSeconds('00:00:01,480') === 1.48);
check('ts: 00:01:02,500 вҶ’ 62.5', timestampToSeconds('00:01:02,500') === 62.5);
check('ts: зӮ№еҲҶйҡ” 00:00:05.000 вҶ’ 5', timestampToSeconds('00:00:05.000') === 5);
check('ts: йқһжі•иҝ”еӣһ null', timestampToSeconds('abc') === null);

// --- parseSRT ---
const sample = '1\n00:00:00,080 --> 00:00:01,480\nWhen you encode text into binary\n\n'
  + '2\n00:00:02,080 --> 00:00:04,200\nit\'s often nice\nto use as little data as possible\n\n'
  + '3\n00:00:04,720 --> 00:00:10,600\nSo you might naturally wonder\n';
const s = parseSRT(sample);
check('и§ЈжһҗеҮә 3 еҸҘ', s.length === 3);
check('з¬¬1еҸҘ start=0.08', s[0].start === 0.08);
check('з¬¬1еҸҘ id=1', s[0].id === 1);
check('з¬¬1еҸҘж–Үжң¬жӯЈзЎ®', s[0].text === 'When you encode text into binary');
check('з¬¬2еҸҘеӨҡиЎҢж–Үжң¬еҗҲе№¶', s[1].text === "it's often nice\nto use as little data as possible");
check('е®№й”ҷпјҡеқҸеқ—и·іиҝҮ', parseSRT('1\n00:00:00,080 --> 00:00:01,480\nhello\n\nеқҸеқ—\n\n2\n00:00:02,000 --> 00:00:03,000\nworld\n').length === 2);

// --- buildVocab / lookupWords ---
const vo = { 'еҲқдёӯ': { 'encode': 'v. зј–з Ғ', 'text': 'n. ж–Үжң¬' }, 'еӣӣзә§': { 'compress': 'v. еҺӢзј©', 'binary': 'n. дәҢиҝӣеҲ¶' } };
const v = buildVocab(vo);
check('buildVocab: encode е‘Ҫдёӯ еҲқдёӯ', v['encode'].level === 'еҲқдёӯ' && v['encode'].def === 'v. зј–з Ғ');
check('buildVocab: compress е‘Ҫдёӯ еӣӣзә§', v['compress'].level === 'еӣӣзә§');
const w = lookupWords('When you ENCODE text into binary!', v);
check('lookup: ж•°йҮҸ=3', w.length === 3);
check('lookup: еӨ§е°ҸеҶҷеҪ’дёҖ', w[0].word === 'encode');
check('lookup: еҺ»ж ҮзӮ№', w[2].word === 'binary');
check('lookup: йҮҚеӨҚеҺ»йҮҚ', lookupWords('text text text', v).length === 1);
check('lookup: жңӘе‘ҪдёӯдёҚиҝ”еӣһ', lookupWords('hello world', v).length === 0);

// --- VocabStore ---
const store = createVocabStore(buildVocab, classifyWords);
store.init(vo);
check('VocabStore: isReady', store.isReady() === true);
check('VocabStore: levels йЎәеәҸ(еҗ«и¶…зәІ)', JSON.stringify(store.getLevels()) === '["еҲқдёӯ","еӣӣзә§","и¶…зәІ"]');
check('VocabStore: еӣӣзә§й»ҳи®ӨдёҚеӢҫйҖү', store.isEnabled('еӣӣзә§') === false);
// дёәжҹҘиҜўжөӢиҜ•еҗҜз”Ё еҲқдёӯ/еӣӣзә§пјҲй»ҳи®ӨжҳҜе…ій—ӯзҡ„пјү
store.setEnabled('еҲқдёӯ', true);
store.setEnabled('еӣӣзә§', true);
const g1 = store.lookupByLevel('When you ENCODE text into binary compress');
check('lookupByLevel: еҲқдёӯ 2 иҜҚ', g1['еҲқдёӯ'] && g1['еҲқдёӯ'].length === 2);
check('lookupByLevel: еӣӣзә§ 2 иҜҚ', g1['еӣӣзә§'] && g1['еӣӣзә§'].length === 2);
check('lookupByLevel: еҲқдёӯйҰ–иҜҚ encode', g1['еҲқдёӯ'][0].word === 'encode');
store.setEnabled('еӣӣзә§', false);
check('VocabStore: еҸ–ж¶ҲеҗҺ false', store.isEnabled('еӣӣзә§') === false);
const g2 = store.lookupByLevel('When you ENCODE text into binary compress');
check('lookupByLevel: еҸ–ж¶ҲеҗҺж— еӣӣзә§ж Ҹ', g2['еӣӣзә§'] === undefined && g2['еҲқдёӯ'].length === 2);
const gh = store.lookupByLevel('hello world');
check('lookupByLevel: е…Ёи¶…зәІиҜҚеҪ’и¶…зәІз»„', !!gh['и¶…зәІ'] && gh['и¶…зәІ'].length === 2);
// и¶…зәІеҲҶзә§
const sg = store.lookupByLevel('encode compress zzz'); // encodeвҶ’еҲқдёӯ, compressвҶ’еӣӣзә§(е·Іе…і), zzzвҶ’и¶…зәІ
check('VocabStore: и¶…зәІз»„еӯҳеңЁ', !!sg['и¶…зәІ'] && sg['и¶…зәІ'].length === 1);
store.setEnabled('и¶…зәІ', false);
check('VocabStore: еҸ–ж¶Ҳи¶…зәІеҗҺж— и¶…зәІж Ҹ', store.lookupByLevel('encode zzz')['и¶…зәІ'] === undefined);
store.setEnabled('и¶…зәІ', true);
// й»ҳи®ӨеӢҫйҖүзҠ¶жҖҒ
const s2 = createVocabStore(buildVocab, classifyWords);
s2.init(vo);
check('VocabStore: еҲқдёӯй»ҳи®ӨдёҚеӢҫйҖү', s2.isEnabled('еҲқдёӯ') === false);
check('VocabStore: и¶…зәІй»ҳи®ӨеӢҫйҖү', s2.isEnabled('и¶…зәІ') === true);

  // --- subtitle-tweak ---
  const ss = [{ id: 1, start: 0, end: 1 }, { id: 2, start: 2, end: 3 }, { id: 3, start: 5, end: 6 }];
  const m0 = computeEffectiveRanges(ss, {});
  check('tweak: й»ҳи®Ө effStart=start/effEnd=end', m0.get(1).effStart === 0 && m0.get(1).effEnd === 1);
  const mo = computeEffectiveRanges(ss, { offset: 1 });
  check('tweak: offset еҪұе“Қ start', mo.get(1).effStart === 1);
  const me = computeEffectiveRanges(ss, { extend: 0.5 });
  check('tweak: extend еҪұе“Қ end', me.get(1).effEnd === 1.5);
  const ml = computeEffectiveRanges(ss, { linkNext: true });
  check('tweak: linkNext иҝһдёӢдёҖеҸҘ start', ml.get(1).effEnd === 2);
  check('tweak: linkNext жң«еҸҘз”Ё end', ml.get(3).effEnd === 6);
  const ml2 = computeEffectiveRanges(ss, { linkNext: true, extend: 0.5 });
  check('tweak: linkNext жң«еҸҘ end+extend', ml2.get(3).effEnd === 6.5);
  const mlo = computeEffectiveRanges(ss, { linkNext: true, linkNextOffset: -0.3 });
  check('tweak: linkNextOffset -0.3 жҸҗеүҚз»“жқҹ', mlo.get(1).effEnd === 1.7);
  const mlo2 = computeEffectiveRanges(ss, { linkNext: true, linkNextOffset: 0.5 });
  check('tweak: linkNextOffset +0.5 е»¶еҗҺ', mlo2.get(1).effEnd === 2.5);
  const mlo3 = computeEffectiveRanges(ss, { linkNext: true, offset: 1, linkNextOffset: -0.3 });
  check('tweak: offset+linkNextOffset еҸ еҠ ', mlo3.get(1).effEnd === 2.7);
  const mc = computeEffectiveRanges([{ id: 1, start: 5, end: 6 }], { offset: 10 });
  check('tweak: effEnd<=effStart еӨ№еҲ° +0.05', mc.get(1).effStart === 15 && mc.get(1).effEnd === 15.05);

  // --- tokenizeForRender / classifyWords ---
  const tv = { 'hello': { level: 'еҲқдёӯ', def: 'x' } };
  const toks = tokenizeForRender('Hello, world!', tv);
  check('tokenize: зүҮж®өж•°=4', toks.length === 4);
  check('tokenize: иҜҚзүҮж®өеёҰзә§еҲ«', toks[0].text === 'Hello' && toks[0].level === 'еҲқдёӯ');
  check('tokenize: йқһиҜҚзүҮж®ө level=null', toks[1].text === ', ' && toks[1].level === null);
  check('tokenize: жңӘе‘ҪдёӯиҜҚ=и¶…зәІ', toks[2].text === 'world' && toks[2].level === 'и¶…зәІ');
  check('tokenize: жң«е°ҫж ҮзӮ№', toks[3].text === '!' && toks[3].level === null);

  const grps = classifyWords('Hello hello world', tv);
  check('classify: еҲқдёӯеҺ»йҮҚ=1', grps['еҲқдёӯ'] && grps['еҲқдёӯ'].length === 1);
  check('classify: и¶…зәІ=1', grps['и¶…зәІ'] && grps['и¶…зәІ'].length === 1);
  check('classify: и¶…зәІ def з©ә', grps['и¶…зәІ'][0].def === '');

  // --- lemmatize ---
  check('lem: raisesвҶ’еҗ« raise', lemmatize('raises').includes('raise'));
  check('lem: runningвҶ’еҗ« run', lemmatize('running').includes('run'));
  check('lem: studiesвҶ’еҗ« study', lemmatize('studies').includes('study'));
  check('lem: wentвҶ’еҗ« go', lemmatize('went').includes('go'));
  check('lem: happilyвҶ’еҗ« happy', lemmatize('happily').includes('happy'));
  // зј©зәҰеҪўејҸиҝҳеҺҹ
  check("lem: don'tвҶ’do", lemmatize("don't").includes('do'));
  check("lem: can'tвҶ’can", lemmatize("can't").includes('can'));
  check("lem: it'sвҶ’it", lemmatize("it's").includes('it'));
  check("lem: let'sвҶ’let", lemmatize("let's").includes('let'));
  // ж’ҮеҸ·жүҖжңүж јпјҡеҸ–ж’ҮеҸ·еүҚ base еҶҚиҝҳеҺҹпјҲletters' вҶ’ letters вҶ’ letterпјү
  check("lem: letters'вҶ’letter", lemmatize("letters'").includes('letter'));
  // еҚ•еӯ—жҜҚдёҚеӨ„зҗҶ
  check('lem: еҚ•еӯ—жҜҚ sвҶ’з©ә', lemmatize('s').length === 0);
  // жҜ”иҫғзә§ / жңҖй«ҳзә§ / еүҜиҜҚ
  check('lem: easierвҶ’easy', lemmatize('easier').includes('easy'));
  check('lem: easiestвҶ’easy', lemmatize('easiest').includes('easy'));
  check('lem: inexorablyвҶ’inexorable', lemmatize('inexorably').includes('inexorable'));
  check('lem: heardвҶ’hearпјҲдёҚи§„еҲҷпјү', lemmatize('heard').includes('hear'));

  // --- иҜҚеҪўиҝҳеҺҹжҹҘиҜҚпјҲз«ҜеҲ°з«Ҝпјү ---
  const lvo = { 'еҲқдёӯ': { raise: 'v. дёҫиө·', run: 'v. и·‘', study: 'v. еӯҰд№ ', letter: 'n. еӯ—жҜҚ' } };
  const lv = buildVocab(lvo);
  check('lookup: raises иҝҳеҺҹе‘Ҫдёӯ raise', lookupWords('He raises his hand', lv)[0].word === 'raise');
  check('classify: raisesвҶ’raise жҳҫзӨәеҺҹеҪў', classifyWords('raises', lv)['еҲқдёӯ'][0].word === 'raise');
  check('classify: raises+raising еҗҲе№¶дёҖжқЎ', classifyWords('raises raising raised', lv)['еҲқдёӯ'].length === 1);
  check('classify: и¶…зәІиҜҚиҝҳеҺҹеӨұиҙҘд»Қи¶…зәІ', !!classifyWords('zzzz', lv)['и¶…зәІ']);
  // зј©зәҰ/жүҖжңүж ј/еҚ•еӯ—жҜҚеңЁжҹҘиҜҚй“ҫи·Ҝзҡ„иЎҢдёә
  check("classify: don'tвҶ’do е‘ҪдёӯпјҲеә“еҗ« doпјү", classifyWords("don't", buildVocab({ 'еҲқдёӯ': { do: 'v. еҒҡ' } }))['еҲқдёӯ'][0].word === 'do');
  check("classify: letters'вҶ’letter е‘Ҫдёӯ", classifyWords("letters'", lv)['еҲқдёӯ'][0].word === 'letter');
  check('classify: еҚ•еӯ—жҜҚдёҚиҝӣи¶…зәІ', classifyWords('a s b', lv)['и¶…зәІ'] === undefined);
  check('tokenize: еҚ•еӯ—жҜҚдёҚзқҖиүІпјҲlevel=nullпјү', tokenizeForRender('a x', lv)[0].level === null);
  // еҸҢеұӮиҝҳеҺҹпјҡencodings вҶ’ encoding вҶ’ encode
  check('classify: encodingsвҶ’encodeпјҲеҸҢеұӮпјү', classifyWords('encodings', buildVocab({ 'еҲқдёӯ': { encode: 'v. зј–з Ғ' } }))['еҲқдёӯ'][0].word === 'encode');

out.innerHTML += '\n----\nйҖҡиҝҮ ' + pass + 'пјҢеӨұиҙҘ ' + fail + '\n';
</script>
</body>
</html>
