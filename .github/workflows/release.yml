name: Release

# 推送 v* 标签时触发:构建单文件,以 SubTap.html 附加到该标签对应的 Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: 重命名为 SubTap.html
        run: mv dist/index.html SubTap.html
      - uses: softprops/action-gh-release@v2
        with:
          files: SubTap.html
